<svg viewBox="0 0 860 540" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="860" height="540" fill="#0a0a14" rx="12"/>

  <!-- title -->
  <text x="430" y="32" text-anchor="middle" font-size="15" font-weight="700" fill="#dde6ff" letter-spacing="2">FLOCI NEXUS — System Architecture</text>

  <!-- USER -->
  <rect x="340" y="54" width="180" height="44" rx="8" fill="none" stroke="#4f5a70" stroke-width="1.5"/>
  <text x="430" y="73" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">User</text>
  <text x="430" y="89" text-anchor="middle" font-size="10" fill="#64748b">natural language request</text>

  <line x1="430" y1="98" x2="430" y2="118" stroke="#4f5a70" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- NEXUS API dashed box -->
  <rect x="160" y="118" width="540" height="248" rx="10" fill="none" stroke="#1e2a3a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="174" y="135" font-size="9" fill="#334155" font-weight="600" letter-spacing="1">FLOCI NEXUS API  :3002</text>

  <!-- ARIA -->
  <rect x="182" y="148" width="118" height="62" rx="7" fill="#00d4ff18" stroke="#00d4ff55" stroke-width="1.5"/>
  <text x="241" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#00d4ff">ARIA</text>
  <text x="241" y="183" text-anchor="middle" font-size="9" fill="#94a3b8">Requirements</text>
  <text x="241" y="196" text-anchor="middle" font-size="9" fill="#64748b">llama-3.1-8b</text>

  <!-- FORGE -->
  <rect x="322" y="148" width="118" height="62" rx="7" fill="#ff6b3518" stroke="#ff6b3555" stroke-width="1.5"/>
  <text x="381" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#ff6b35">FORGE</text>
  <text x="381" y="183" text-anchor="middle" font-size="9" fill="#94a3b8">Codegen</text>
  <text x="381" y="196" text-anchor="middle" font-size="9" fill="#64748b">llama-3.3-70b</text>

  <!-- SAGE -->
  <rect x="462" y="148" width="118" height="62" rx="7" fill="#39ff1418" stroke="#39ff1455" stroke-width="1.5"/>
  <text x="521" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#39ff14">SAGE</text>
  <text x="521" y="183" text-anchor="middle" font-size="9" fill="#94a3b8">Validation</text>
  <text x="521" y="196" text-anchor="middle" font-size="9" fill="#64748b">llama-3.1-8b</text>

  <!-- SCOUT -->
  <rect x="602" y="148" width="86" height="62" rx="7" fill="#da70d618" stroke="#da70d655" stroke-width="1.5"/>
  <text x="645" y="168" text-anchor="middle" font-size="11" font-weight="700" fill="#da70d6">SCOUT</text>
  <text x="645" y="183" text-anchor="middle" font-size="9" fill="#94a3b8">Gap detect</text>
  <text x="645" y="196" text-anchor="middle" font-size="9" fill="#64748b">llama-3.1-8b</text>

  <!-- agent arrows -->
  <line x1="300" y1="179" x2="318" y2="179" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="179" x2="458" y2="179" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="580" y1="179" x2="598" y2="179" stroke="#39ff14" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Terraform executor -->
  <rect x="280" y="242" width="200" height="52" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="380" y="262" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Terraform Executor</text>
  <text x="380" y="278" text-anchor="middle" font-size="9" fill="#475569">plan  ·  apply  ·  LocalStack :4566</text>

  <line x1="381" y1="210" x2="381" y2="240" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Admin gate -->
  <rect x="504" y="248" width="132" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="570" y="265" text-anchor="middle" font-size="9" fill="#64748b">Admin gate</text>
  <text x="570" y="279" text-anchor="middle" font-size="9" fill="#475569">plan · apply approval</text>

  <!-- SSE bar -->
  <rect x="182" y="306" width="466" height="36" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
  <text x="415" y="321" text-anchor="middle" font-size="9" font-weight="600" fill="#475569">SSE  /api/stream</text>
  <text x="415" y="334" text-anchor="middle" font-size="9" fill="#334155">task_created · agent_status · chat_message · gap_detected · decay_tick</text>

  <!-- Groq -->
  <rect x="50" y="148" width="100" height="52" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="100" y="171" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Groq API</text>
  <text x="100" y="186" text-anchor="middle" font-size="9" fill="#475569">api.groq.com</text>
  <line x1="150" y1="174" x2="178" y2="174" stroke="#334155" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arr)"/>

  <!-- PostgreSQL -->
  <rect x="160" y="390" width="220" height="110" rx="9" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="270" y="410" text-anchor="middle" font-size="11" font-weight="700" fill="#3b82f6">PostgreSQL + pgvector</text>
  <text x="270" y="428" text-anchor="middle" font-size="9" fill="#475569">episodic_memories   vector(768)</text>
  <text x="270" y="442" text-anchor="middle" font-size="9" fill="#475569">semantic_memories   vector(768)</text>
  <text x="270" y="456" text-anchor="middle" font-size="9" fill="#475569">procedural_memories vector(768)</text>
  <text x="270" y="473" text-anchor="middle" font-size="9" fill="#334155">agent_runs · kanban_tasks · terraform_executions</text>
  <text x="270" y="489" text-anchor="middle" font-size="9" fill="#334155">capability_gaps · admin_approvals</text>

  <!-- Ollama -->
  <rect x="420" y="390" width="140" height="70" rx="9" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="490" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#8b5cf6">Ollama</text>
  <text x="490" y="429" text-anchor="middle" font-size="9" fill="#475569">nomic-embed-text</text>
  <text x="490" y="443" text-anchor="middle" font-size="9" fill="#475569">768-dim · local · free</text>
  <text x="490" y="457" text-anchor="middle" font-size="9" fill="#334155">:11434</text>

  <!-- floci-ui -->
  <rect x="590" y="390" width="140" height="70" rx="9" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="660" y="412" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1">floci-ui</text>
  <text x="660" y="429" text-anchor="middle" font-size="9" fill="#475569">React · Kanban board</text>
  <text x="660" y="443" text-anchor="middle" font-size="9" fill="#475569">Agent Console</text>
  <text x="660" y="457" text-anchor="middle" font-size="9" fill="#334155">:3000</text>

  <!-- connector lines to bottom row -->
  <line x1="182" y1="366" x2="750" y2="366" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="415" y1="342" x2="415" y2="366" stroke="#1e293b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="270" y1="366" x2="270" y2="388" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="490" y1="366" x2="490" y2="388" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="660" y1="366" x2="660" y2="388" stroke="#1e3a5f" stroke-width="1.5" marker-end="url(#arr)"/>
</svg>
