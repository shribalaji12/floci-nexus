<svg viewBox="0 0 860 500" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="pa" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#475569"/>
    </marker>
    <marker id="pa-red" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#ef4444"/>
    </marker>
    <marker id="pa-grn" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#22c55e"/>
    </marker>
  </defs>

  <rect width="860" height="500" fill="#0a0a14" rx="12"/>
  <text x="430" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#dde6ff" letter-spacing="2">FLOCI NEXUS — 8-Stage Pipeline</text>

  <!-- Stage labels -->
  <text x="90"  y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 1</text>
  <text x="185" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 2</text>
  <text x="292" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 3</text>
  <text x="390" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 4</text>
  <text x="490" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 5</text>
  <text x="588" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 6</text>
  <text x="688" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 7</text>
  <text x="787" y="58" text-anchor="middle" font-size="8" fill="#475569">STAGE 8</text>

  <!-- ARIA -->
  <rect x="44" y="70" width="92" height="68" rx="7" fill="#00d4ff18" stroke="#00d4ff55" stroke-width="1.5"/>
  <text x="90" y="92"  text-anchor="middle" font-size="13">🎯</text>
  <text x="90" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="#00d4ff">ARIA</text>
  <text x="90" y="124" text-anchor="middle" font-size="8"  fill="#94a3b8">Requirements</text>
  <text x="90" y="136" text-anchor="middle" font-size="8"  fill="#64748b">JSON output</text>

  <line x1="136" y1="104" x2="141" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- FORGE -->
  <rect x="141" y="70" width="92" height="68" rx="7" fill="#ff6b3518" stroke="#ff6b3555" stroke-width="1.5"/>
  <text x="187" y="92"  text-anchor="middle" font-size="13">⚙️</text>
  <text x="187" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="#ff6b35">FORGE</text>
  <text x="187" y="124" text-anchor="middle" font-size="8"  fill="#94a3b8">Terraform HCL</text>
  <text x="187" y="136" text-anchor="middle" font-size="8"  fill="#64748b">70b model</text>

  <line x1="233" y1="104" x2="248" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Admin gate 1 (diamond) -->
  <polygon points="292,70 336,104 292,138 248,104" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="292" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#f59e0b">Admin</text>
  <text x="292" y="113" text-anchor="middle" font-size="9" fill="#f59e0b">approve?</text>
  <text x="292" y="152" text-anchor="middle" font-size="8" fill="#64748b">plan review</text>

  <!-- rejected path -->
  <line x1="292" y1="138" x2="292" y2="165" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="292" y1="165" x2="90"  y2="165" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="90"  y1="165" x2="90"  y2="140" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#pa-red)"/>
  <text x="178" y="175" font-size="7" fill="#ef4444">rejected → failed</text>

  <!-- approved -->
  <line x1="336" y1="104" x2="351" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>
  <text x="328" y="98" font-size="8" fill="#22c55e">✓</text>

  <!-- TF PLAN -->
  <rect x="351" y="78" width="78" height="52" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="390" y="100" text-anchor="middle" font-size="10" fill="#94a3b8">terraform</text>
  <text x="390" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">plan</text>
  <text x="390" y="128" text-anchor="middle" font-size="8"  fill="#475569">up to 3×</text>

  <!-- Self-correction arc -->
  <path d="M 390,78 Q 390,40 290,40 Q 187,40 187,70" fill="none" stroke="#ff6b35" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#pa)"/>
  <text x="290" y="34" text-anchor="middle" font-size="8" fill="#ff6b35">FORGE self-corrects on failure</text>

  <line x1="429" y1="104" x2="452" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- Admin gate 2 (diamond) -->
  <polygon points="490,70 534,104 490,138 446,104" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="490" y="100" text-anchor="middle" font-size="9" font-weight="600" fill="#f59e0b">Admin</text>
  <text x="490" y="113" text-anchor="middle" font-size="9" fill="#f59e0b">approve?</text>
  <text x="490" y="152" text-anchor="middle" font-size="8" fill="#64748b">apply review</text>

  <!-- rejected path 2 -->
  <line x1="490" y1="138" x2="490" y2="185" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="490" y1="185" x2="90"  y2="185" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="90"  y1="185" x2="90"  y2="140" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#pa-red)"/>

  <!-- approved 2 -->
  <line x1="534" y1="104" x2="550" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>
  <text x="526" y="98" font-size="8" fill="#22c55e">✓</text>

  <!-- TF APPLY -->
  <rect x="550" y="78" width="78" height="52" rx="7" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="589" y="100" text-anchor="middle" font-size="10" fill="#94a3b8">terraform</text>
  <text x="589" y="115" text-anchor="middle" font-size="10" font-weight="700" fill="#94a3b8">apply</text>
  <text x="589" y="128" text-anchor="middle" font-size="8"  fill="#475569">LocalStack</text>

  <line x1="628" y1="104" x2="645" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- SAGE -->
  <rect x="645" y="70" width="88" height="68" rx="7" fill="#39ff1418" stroke="#39ff1455" stroke-width="1.5"/>
  <text x="689" y="92"  text-anchor="middle" font-size="13">🔮</text>
  <text x="689" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="#39ff14">SAGE</text>
  <text x="689" y="124" text-anchor="middle" font-size="8"  fill="#94a3b8">Validation</text>
  <text x="689" y="136" text-anchor="middle" font-size="8"  fill="#64748b">state vs req</text>

  <line x1="733" y1="104" x2="747" y2="104" stroke="#475569" stroke-width="1.5" marker-end="url(#pa)"/>

  <!-- SCOUT -->
  <rect x="747" y="70" width="88" height="68" rx="7" fill="#da70d618" stroke="#da70d655" stroke-width="1.5"/>
  <text x="791" y="92"  text-anchor="middle" font-size="13">🔭</text>
  <text x="791" y="109" text-anchor="middle" font-size="11" font-weight="700" fill="#da70d6">SCOUT</text>
  <text x="791" y="124" text-anchor="middle" font-size="8"  fill="#94a3b8">Gap detect</text>
  <text x="791" y="136" text-anchor="middle" font-size="8"  fill="#64748b">flag admin</text>

  <!-- Memory reads section -->
  <text x="430" y="210" text-anchor="middle" font-size="9" fill="#475569" font-weight="600">Memory reads at each agent stage</text>
  <rect x="170" y="220" width="520" height="46" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="430" y="240" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">AgentBrain — pgvector cosine similarity</text>
  <text x="430" y="256" text-anchor="middle" font-size="9"  fill="#475569">episodic · semantic · procedural  →  getMemoryContext(query)  →  Groq prompt injection</text>

  <!-- memory read connectors -->
  <line x1="90"  y1="138" x2="90"  y2="218" stroke="#00d4ff33" stroke-width="1" stroke-dasharray="2,2"/>
  <line x1="90"  y1="218" x2="200" y2="218" stroke="#00d4ff33" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#pa)"/>
  <line x1="187" y1="138" x2="187" y2="218" stroke="#ff6b3533" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#pa)"/>
  <line x1="689" y1="138" x2="689" y2="218" stroke="#39ff1433" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#pa)"/>
  <line x1="791" y1="138" x2="791" y2="218" stroke="#da70d633" stroke-width="1" stroke-dasharray="2,2" marker-end="url(#pa)"/>

  <!-- Memory writes section -->
  <text x="430" y="290" text-anchor="middle" font-size="9" fill="#475569" font-weight="600">Memory writes after each stage</text>

  <rect x="60"  y="300" width="138" height="46" rx="7" fill="#00d4ff0a" stroke="#00d4ff33" stroke-width="1"/>
  <text x="129" y="320" text-anchor="middle" font-size="9" fill="#00d4ff">storeEpisode()</text>
  <text x="129" y="335" text-anchor="middle" font-size="8" fill="#475569">requirement gathered</text>

  <rect x="214" y="300" width="138" height="46" rx="7" fill="#ff6b350a" stroke="#ff6b3533" stroke-width="1"/>
  <text x="283" y="320" text-anchor="middle" font-size="9" fill="#ff6b35">encodeSkill()</text>
  <text x="283" y="335" text-anchor="middle" font-size="8" fill="#475569">HCL pattern stored</text>

  <rect x="368" y="300" width="138" height="46" rx="7" fill="#39ff140a" stroke="#39ff1433" stroke-width="1"/>
  <text x="437" y="320" text-anchor="middle" font-size="9" fill="#39ff14">learnFact()</text>
  <text x="437" y="335" text-anchor="middle" font-size="8" fill="#475569">validation outcome</text>

  <rect x="522" y="300" width="138" height="46" rx="7" fill="#da70d60a" stroke="#da70d633" stroke-width="1"/>
  <text x="591" y="320" text-anchor="middle" font-size="9" fill="#da70d6">storeEpisode()</text>
  <text x="591" y="335" text-anchor="middle" font-size="8" fill="#475569">gaps discovered</text>

  <rect x="676" y="300" width="122" height="46" rx="7" fill="#22c55e0a" stroke="#22c55e33" stroke-width="1"/>
  <text x="737" y="320" text-anchor="middle" font-size="9" fill="#22c55e">capability_gaps</text>
  <text x="737" y="335" text-anchor="middle" font-size="8" fill="#475569">table upserted</text>

  <text x="430" y="368" text-anchor="middle" font-size="9" fill="#334155">All writes embed via Ollama nomic-embed-text (768-dim) stored as vector(768) in PostgreSQL</text>

  <!-- Kanban columns -->
  <text x="430" y="393" text-anchor="middle" font-size="9" fill="#475569" font-weight="600">Kanban columns (live via SSE)</text>

  <rect x="36"  y="403" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="72"  y="418" text-anchor="middle" font-size="8" fill="#475569">queued</text>
  <rect x="114" y="403" width="72" height="22" rx="4" fill="#00d4ff14" stroke="#00d4ff33" stroke-width="1"/>
  <text x="150" y="418" text-anchor="middle" font-size="8" fill="#00d4ff">gathering</text>
  <rect x="192" y="403" width="72" height="22" rx="4" fill="#ff6b3514" stroke="#ff6b3533" stroke-width="1"/>
  <text x="228" y="418" text-anchor="middle" font-size="8" fill="#ff6b35">forging</text>
  <rect x="270" y="403" width="72" height="22" rx="4" fill="#f59e0b14" stroke="#f59e0b33" stroke-width="1"/>
  <text x="306" y="418" text-anchor="middle" font-size="8" fill="#f59e0b">pend plan</text>
  <rect x="348" y="403" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="384" y="418" text-anchor="middle" font-size="8" fill="#475569">planning</text>
  <rect x="426" y="403" width="72" height="22" rx="4" fill="#f59e0b14" stroke="#f59e0b33" stroke-width="1"/>
  <text x="462" y="418" text-anchor="middle" font-size="8" fill="#f59e0b">pend apply</text>
  <rect x="504" y="403" width="72" height="22" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="418" text-anchor="middle" font-size="8" fill="#475569">deploying</text>
  <rect x="582" y="403" width="72" height="22" rx="4" fill="#39ff1414" stroke="#39ff1433" stroke-width="1"/>
  <text x="618" y="418" text-anchor="middle" font-size="8" fill="#39ff14">validating</text>
  <rect x="660" y="403" width="72" height="22" rx="4" fill="#da70d614" stroke="#da70d633" stroke-width="1"/>
  <text x="696" y="418" text-anchor="middle" font-size="8" fill="#da70d6">scouting</text>
  <rect x="738" y="403" width="72" height="22" rx="4" fill="#22c55e14" stroke="#22c55e33" stroke-width="1"/>
  <text x="774" y="418" text-anchor="middle" font-size="8" fill="#22c55e">complete</text>

  <line x1="46" y1="443" x2="800" y2="443" stroke="#1e293b" stroke-width="1.2" marker-end="url(#pa)"/>
  <text x="430" y="468" text-anchor="middle" font-size="8" fill="#334155">AUTO_APPROVE=true skips both admin gates · set to false for manual review</text>
  <text x="430" y="485" text-anchor="middle" font-size="8" fill="#334155">FORGE self-corrects on terraform plan failure · up to 3 attempts per run</text>
</svg>
